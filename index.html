<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Walk cycle</title>
    <style>
      #controls {
        position: fixed;
        bottom: 30px;
        width: 100%;
        display: flex;
        justify-content: space-between;
        padding: 0 40px;
        box-sizing: border-box;
      }

      #controls button {
        width: 80px;
        height: 80px;
        font-size: 2rem;
        border-radius: 50%;
        border: none;
        background: rgba(255, 255, 255, 0.3);
        color: white;
        cursor: pointer;
        user-select: none;
      }
      body {
        margin: 0;
        background: #b1b1ff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="controls">
      <button id="btn-left">←</button>
      <button id="btn-right">→</button>
    </div>
    <script src="https://pixijs.download/release/pixi.js"></script>
    <script>
      (async () => {
        const app = new PIXI.Application();
        await app.init({
          width: 800,
          height: 800,
          backgroundColor: 0x000000,
        });
        document.body.appendChild(app.canvas);

        const frameCount = 14;
        const textures = [];

        for (let i = 1; i <= frameCount; i++) {
          const num = String(i).padStart(3, "0");
          const texture = await PIXI.Assets.load(
            `walkcycle/Walk with bundle_${num}.png`,
          );
          textures.push(texture);
        }

        const character = new PIXI.AnimatedSprite(textures);

        character.animationSpeed = 0.3;
        character.anchor.set(0.4, 1.0);
        character.x = app.screen.width / 2;
        character.y = app.screen.height - 20;
        character.scale = 0.3;

        const keys = {};

        window.addEventListener("keydown", (e) => {
          keys[e.key] = true;
        });
        window.addEventListener("keyup", (e) => {
          keys[e.key] = false;
        });
        document
          .getElementById("btn-left")
          .addEventListener("touchstart", (e) => {
            e.preventDefault();
            keys["ArrowLeft"] = true;
          },{ passive: false });
        document.getElementById("btn-left").addEventListener("touchend", () => {
          keys["ArrowLeft"] = false;
        });

        document
          .getElementById("btn-right")
          .addEventListener("touchstart", (e) => {
            e.preventDefault();
            keys["ArrowRight"] = true;
          },{ passive: false });
        document
          .getElementById("btn-right")
          .addEventListener("touchend", () => {
            keys["ArrowRight"] = false;
          });

        const speed = 3;
        const hillSpeed = speed * 0.4;

        const hillTextures = [];

        for (let i = 1; i <= 3; i++) {
          const texture = await PIXI.Assets.load(`hills/${i}.png`);
          hillTextures.push(texture);
        }
        const hillScale = app.screen.height / 2160;
        const hillWidth = 3840 * hillScale;
        const hillSequence = [0, 1, 2, 2, 1, 0];
        const hillFlip = [false, false, false, true, true, true];
        const hills = [];

        for (let i = 0; i < hillSequence.length; i++) {
          const hill = new PIXI.Sprite(hillTextures[hillSequence[i]]);

          hill.scale.set(hillScale);
          hill.anchor.set(0, 0);
          hill.x = (i - 1) * hillWidth;
          hill.y = 0;

          if (hillFlip[i]) {
            hill.scale.x = -hillScale;
            hill.x = (i - 1 + 1) * hillWidth;
          }

          app.stage.addChild(hill);
          hills.push(hill);
        }

        const treeTextures = [];
        const treeCount = 6;
        for (let i = 1; i <= treeCount; i++) {
          const texture = await PIXI.Assets.load(`Trees/tree-${i}.png`);
          treeTextures.push(texture);
        }

        const trees = [];
        const treeSpacing = 2000;
        const numberOfTrees = 15;

        for (let i = 0; i < numberOfTrees; i++) {
          const randomTexture =
            treeTextures[Math.floor(Math.random() * treeTextures.length)];
          const tree = new PIXI.Sprite(randomTexture);

          tree.anchor.set(0.5, 1.0);
          tree.scale.set(0.4);
          tree.x = i * treeSpacing;
          tree.y = app.screen.height - 20;

          app.stage.addChild(tree);
          trees.push(tree);
        }

        app.ticker.add(() => {
          const movingLeft = keys["ArrowLeft"];
          const movingRight = keys["ArrowRight"];

          if (movingRight) {
            character.scale.set(0.3, 0.3);
            for (const tree of trees) {
              tree.x -= speed;
            }
            for (const hill of hills) {
              hill.x -= hillSpeed;
            }
          } else if (movingLeft) {
            character.scale.set(-0.3, 0.3);
            for (const tree of trees) {
              tree.x += speed;
            }
            for (const hill of hills) {
              hill.x += hillSpeed;
            }
          }
          if (movingLeft || movingRight) {
            if (!character.playing) character.play();
          } else {
            if (character.playing) character.stop();
          }
          const worldWidth = numberOfTrees * treeSpacing;

          for (const tree of trees) {
            if (tree.x < -app.screen.width) {
              tree.x += worldWidth;
            } else if (tree.x > worldWidth + app.screen.width) {
              tree.x -= worldWidth;
            }
          }
          const hillWorldWidth = hillSequence.length * hillWidth;

          for (const hill of hills) {
            if (hill.x < -hillWidth * 2) {
              hill.x += hillWorldWidth;
            } else if (hill.x > hillWorldWidth) {
              hill.x -= hillWorldWidth;
            }
          }
        });

        app.stage.addChild(character);
      })();
    </script>
  </body>
</html>

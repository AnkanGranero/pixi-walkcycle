<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Walk cycle</title>
    <style>
      body {
        margin: 0;
        background: #b1b1ff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <script src="https://pixijs.download/release/pixi.js"></script>
    <script>
      (async () => {
        const app = new PIXI.Application();
        await app.init({
          width: 800,
          height: 800,
          backgroundColor: 0x1a1a2e,
        });
        document.body.appendChild(app.canvas);

        const frameCount = 14;
        const textures = [];

        for (let i = 1; i <= frameCount; i++) {
          const num = String(i).padStart(3, "0");
          const texture = await PIXI.Assets.load(
            `walkcycle/Walk with bundle_${num}.png`,
          );
          textures.push(texture);
        }

        const character = new PIXI.AnimatedSprite(textures);

        character.animationSpeed = 0.3;
        character.anchor.set(0.4, 1.0);
        character.x = app.screen.width / 2;
        character.y = app.screen.height - 20;
        character.scale = 0.3;

        const keys = {};

        window.addEventListener("keydown", (e) => {
          keys[e.key] = true;
        });
        window.addEventListener("keyup", (e) => {
          keys[e.key] = false;
        });

        const speed = 3;

           const treeTextures = [];
        const treeCount = 6;
        for (let i = 1; i <= treeCount; i++) {
          const texture = await PIXI.Assets.load(`Trees/tree-${i}.png`);
          treeTextures.push(texture);
        }

        const trees = [];
        const treeSpacing = 2000;
        const numberOfTrees = 15;

        for (let i = 0; i < numberOfTrees; i++) {
          const randomTexture =
            treeTextures[Math.floor(Math.random() * treeTextures.length)];
          const tree = new PIXI.Sprite(randomTexture);

          tree.anchor.set(0.5, 1.0);
          tree.scale.set(0.4);
          tree.x = i * treeSpacing;
          tree.y = app.screen.height - 20;

          app.stage.addChild(tree);
          trees.push(tree);
        }

        app.ticker.add(() => {
          const movingLeft = keys["ArrowLeft"];
          const movingRight = keys["ArrowRight"];

          if (movingRight) {
            character.scale.set(0.3, 0.3);
            for (const tree of trees) {
              tree.x -= speed;
            }
          } else if (movingLeft) {
            character.scale.set(-0.3, 0.3);
            for (const tree of trees) {
              tree.x += speed;
            }
          }
          if (movingLeft || movingRight) {
            if (!character.playing) character.play();
          } else {
            if (character.playing) character.stop();
          }
          const worldWidth = numberOfTrees * treeSpacing;

          for (const tree of trees) {
            if (tree.x < -app.screen.width) {
              tree.x += worldWidth;
            } else if (tree.x > worldWidth + app.screen.width) {
              tree.x -= worldWidth;
            }
          }
        });

     
        app.stage.addChild(character);
      })();
    </script>
  </body>
</html>
